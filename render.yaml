services:
  # Backend: FastAPI Web Service
  - type: web
    name: azure-forecast-backend
    runtime: python
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && python scripts/generate_data.py && python scripts/train.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

  # Frontend: Static Site
  - type: web
    name: azure-forecast-dashboard
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: VITE_API_URL
        value: "https://azure-forecast-backend.onrender.com"
